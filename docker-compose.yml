services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /fitapp/api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:80"
    depends_on:
      - api

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://fitapp_user:fitapp_password@postgres:5432/fitapp_db
    ports:
      - "127.0.0.1:3101:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitapp_db
      POSTGRES_USER: fitapp_user
      POSTGRES_PASSWORD: fitapp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitapp_user -d fitapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
